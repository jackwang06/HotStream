<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HotStream · 热点到文案</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #111827;
      --accent: #14b8a6;
      --accent-soft: #e6fffb;
      --radius: 24px;
      --shadow: 0 24px 70px rgba(17, 24, 39, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(20, 184, 166, .14), transparent 30%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
    }

    button, textarea, input, select { font: inherit; }
    button { cursor: pointer; }

    .page {
      width: min(1480px, calc(100% - 56px));
      margin: 0 auto;
      padding: 44px 0 56px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 34px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--primary);
      box-shadow: 0 12px 26px rgba(17, 24, 39, .16);
    }

    .status {
      color: var(--muted);
      font-size: 14px;
    }

    .hero {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      max-width: 840px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.02;
      letter-spacing: -.06em;
    }


    .mode {
      display: flex;
      gap: 8px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 10px 30px rgba(17, 24, 39, .04);
    }

    .mode button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      color: var(--muted);
      background: transparent;
      font-weight: 750;
    }

    .mode button.active {
      color: var(--text);
      background: var(--accent-soft);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(500px, .92fr) minmax(640px, 1.08fr);
      gap: 24px;
      align-items: start;
    }

    .card {
      min-height: 560px;
      border: 1px solid rgba(229, 231, 235, .9);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .88);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 22px 22px 16px;
      border-bottom: 1px solid #eef0f3;
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .step {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--primary);
      font-size: 14px;
      font-weight: 850;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -.03em;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .card-body { padding: 22px 24px 24px; }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    select, input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      outline: none;
      background: #fff;
      color: var(--text);
      transition: .18s ease;
    }

    select, input { padding: 13px 14px; }
    textarea {
      min-height: 210px;
      resize: vertical;
      padding: 15px;
      line-height: 1.7;
    }

    select:focus, input:focus, textarea:focus {
      border-color: rgba(20, 184, 166, .75);
      box-shadow: 0 0 0 4px rgba(20, 184, 166, .12);
    }

    .main-btn {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 15px 18px;
      color: #fff;
      background: var(--primary);
      font-weight: 850;
      letter-spacing: -.01em;
      transition: .18s ease;
    }

    .main-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 34px rgba(17, 24, 39, .18);
    }

    .main-btn.accent { background: linear-gradient(135deg, #0f766e, var(--accent)); }

    .fetch-meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .topic-list {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .topic {
      display: grid;
      grid-template-columns: 34px 1fr auto 38px;
      gap: 12px;
      align-items: center;
      padding: 13px;
      border: 1px solid #edf0f3;
      border-radius: 18px;
      background: #fff;
      cursor: pointer;
      transition: .18s ease;
    }

    .topic:hover, .topic.selected, .topic:focus-visible {
      border-color: rgba(20, 184, 166, .55);
      background: #fbfffe;
    }

    .topic:focus-visible {
      outline: 3px solid rgba(20, 184, 166, .18);
      outline-offset: 2px;
    }

    .rank {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #0f766e;
      background: var(--accent-soft);
      font-weight: 900;
    }

    .topic-text {
      min-width: 0;
    }

    .topic strong {
      display: block;
      font-size: 15px;
      letter-spacing: -.02em;
    }

    .topic-source {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .hot {
      color: #ef4444;
      font-weight: 850;
      white-space: nowrap;
    }

    .topic-link {
      width: 38px;
      height: 38px;
      border: 1px solid rgba(20, 184, 166, .24);
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #0f766e;
      background: var(--accent-soft);
      font-size: 18px;
      font-weight: 900;
      text-decoration: none;
      transition: .18s ease;
    }

    .topic-link:hover, .topic-link:focus-visible {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
      transform: translateY(-1px);
      outline: none;
    }

    .topic-link.disabled {
      color: #9ca3af;
      background: #f3f4f6;
      border-color: #e5e7eb;
      cursor: not-allowed;
    }

    .empty {
      margin-top: 18px;
      padding: 28px;
      border: 1px dashed #d1d5db;
      border-radius: 18px;
      color: var(--muted);
      text-align: center;
      background: #fafafa;
    }

    .advanced-settings {
      margin: 14px 0;
      border: 1px solid #edf0f3;
      border-radius: 18px;
      background: #fbfffe;
      overflow: hidden;
    }

    .advanced-settings summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      font-weight: 850;
    }

    .advanced-settings summary span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .prompt-editor {
      display: grid;
      gap: 12px;
      padding: 0 16px 16px;
    }

    .secret-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .secret-toggle {
      min-width: 86px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px 14px;
      color: #374151;
      background: #fff;
      font-weight: 800;
    }

    .prompt-field label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      color: #374151;
      font-size: 13px;
      font-weight: 800;
    }

    .prompt-field label span {
      color: var(--muted);
      font-weight: 600;
    }

    .prompt-field textarea {
      min-height: 148px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12.5px;
      line-height: 1.65;
    }

    .prompt-tools {
      display: flex;
      gap: 10px;
    }

    .bilibili-tools,
    .video-analysis {
      display: grid;
      gap: 10px;
      margin: 12px 0 14px;
    }

    .bilibili-tools {
      grid-template-columns: 1fr 1fr;
    }

    .video-analysis {
      padding: 14px;
      border: 1px solid #edf0f3;
      border-radius: 18px;
      background: #fbfffe;
    }

    .video-analysis.hidden,
    .bilibili-tools.hidden {
      display: none;
    }

    .video-analysis-output {
      min-height: 72px;
      padding: 12px;
      border: 1px dashed #d1d5db;
      border-radius: 14px;
      color: var(--muted);
      background: #fff;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .prompt-tools .ghost-btn {
      flex: 0 1 auto;
      padding: 10px 12px;
      font-size: 13px;
    }

    .image-section {
      margin-top: 14px;
    }

    .image-section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      color: #374151;
      font-size: 13px;
      font-weight: 850;
    }

    .image-section-title span {
      color: var(--muted);
      font-weight: 600;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .image-card {
      min-width: 0;
      overflow: hidden;
      border: 1px solid #edf0f3;
      border-radius: 16px;
      background: #fff;
      color: inherit;
      text-decoration: none;
    }

    .image-card img {
      display: block;
      width: 100%;
      aspect-ratio: 1.3;
      object-fit: cover;
      background: #f3f4f6;
    }

    .image-card span {
      display: block;
      overflow: hidden;
      padding: 8px 9px;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .image-empty {
      padding: 14px;
      border: 1px dashed #d1d5db;
      border-radius: 16px;
      color: var(--muted);
      background: #fafafa;
      font-size: 13px;
      text-align: center;
    }

    .copy-output {
      min-height: 302px;
      margin-top: 14px;
      padding: 18px;
      border: 1px solid #edf0f3;
      border-radius: 18px;
      background: #fbfbfc;
      line-height: 1.8;
      color: #374151;
      white-space: pre-wrap;
    }

    .edit-flow {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 10px;
      margin-top: 12px;
    }

    .edit-flow .ghost-btn.primary-edit {
      border-color: transparent;
      color: #fff;
      background: linear-gradient(135deg, #0f766e, var(--accent));
      box-shadow: 0 14px 30px rgba(20, 184, 166, .18);
    }

    .small-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .ghost-btn {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      color: #374151;
      background: #fff;
      font-weight: 750;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translate(-50%, 16px);
      opacity: 0;
      pointer-events: none;
      padding: 13px 16px;
      border-radius: 999px;
      color: #fff;
      background: #111827;
      box-shadow: 0 18px 42px rgba(17, 24, 39, .22);
      transition: .22s ease;
      font-size: 14px;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 900px) {
      .workspace { grid-template-columns: 1fr; }
      .card { min-height: auto; }
      .mode { justify-self: start; }
    }

    @media (max-width: 560px) {
      .page { width: min(100% - 24px, 1120px); padding: 24px 0; }
      header { align-items: flex-start; flex-direction: column; }
      .controls { grid-template-columns: 1fr; }
      .topic { grid-template-columns: 34px 1fr auto; }
      .hot { grid-column: 2; }
      .topic-link { grid-column: 3; grid-row: 1 / span 2; }
      .image-grid { grid-template-columns: repeat(2, 1fr); }
      .secret-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div class="brand"><div class="logo">H</div><span>HotStream</span></div>
    </header>

    <section class="hero">
      <h1>前山如画，四季成歌</h1>
    </section>

    <section class="workspace">
      <div class="card">
        <div class="card-head">
          <div class="card-title"><span class="step">1</span><h2>抓取热点</h2></div>
        </div>
        <div class="card-body">
          <div class="controls">
            <select id="source">
              <option value="toutiao">今日头条</option>
              <option value="xiaohongshu">小红书</option>
              <option value="zhihu">知乎</option>
              <option value="bilibili">B站视频</option>
            </select>
            <input id="keyword" placeholder="可选关键词，例如：草原、避暑、团建" />
          </div>
          <div class="bilibili-tools hidden" id="bilibiliTools">
            <select id="bilibiliCategory" aria-label="B站视频分类">
              <option value="all">全部热门</option>
              <option value="life">生活</option>
              <option value="travel">出行/旅行</option>
              <option value="food">美食</option>
              <option value="knowledge">知识</option>
              <option value="technology">科技</option>
              <option value="entertainment">娱乐</option>
              <option value="documentary">纪录片</option>
            </select>
            <span class="hint">B站按公开播放量从高到低展示；输入关键词会请求 B站搜索接口。</span>
          </div>
          <button class="main-btn" id="fetchBtn">刷新今日头条热点</button>
          <div class="fetch-meta" id="fetchMeta">进入页面后自动抓取，每 60 秒刷新一次。</div>

          <div class="topic-list" id="topicList">
            <div class="empty">正在抓取今日头条热点...</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <div class="card-title"><span class="step">2</span><h2>生成文案</h2></div>
        </div>
        <div class="card-body">
          <textarea id="brief" placeholder="文案要求：口吻、平台、字数、目标用户"></textarea>
          <details class="advanced-settings" open>
            <summary>高级设置</summary>
            <div class="prompt-editor">
              <div class="prompt-field">
                <label for="deepseekApiKey">DeepSeek API Key <span>必填，用于生成推文</span></label>
                <div class="secret-row">
                  <input id="deepseekApiKey" type="password" autocomplete="off" spellcheck="false" placeholder="粘贴 DeepSeek API Key，例如 sk-..." />
                  <button class="secret-toggle" id="toggleApiKeyBtn" type="button" aria-pressed="false">显示</button>
                </div>
              </div>
              <div class="prompt-field">
                <label for="qwenApiKey">Qwen2.5-VL API Key <span>B站视频分析时填写</span></label>
                <input id="qwenApiKey" type="password" autocomplete="off" spellcheck="false" placeholder="粘贴兼容 DashScope 的 Qwen API Key" />
              </div>
              <div class="video-analysis hidden" id="videoAnalysisPanel">
                <button class="ghost-btn" id="analyzeVideoBtn" type="button">用 Qwen2.5-VL 分析所选 B站视频</button>
                <div class="video-analysis-output" id="videoAnalysisOutput">选择 B站视频后，先用 Qwen2.5-VL 分析封面/公开信息，再交给 DeepSeek 生成前山牧场四季牧歌推文。</div>
              </div>
              <div class="prompt-field">
                <label for="globalPrompt">全局提示词</label>
                <textarea id="globalPrompt" placeholder="全局提示词"></textarea>
              </div>
              <div class="prompt-field">
                <label for="temporaryPrompt">本次提示词</label>
                <textarea id="temporaryPrompt" placeholder="本次提示词"></textarea>
              </div>
              <div class="prompt-tools">
                <button class="ghost-btn" id="resetPromptsBtn">恢复当前热点默认提示词</button>
              </div>
            </div>
          </details>
          <button class="main-btn accent" id="generateBtn">生成文案</button>
          <div class="edit-flow" aria-label="编辑入口">
            <button class="ghost-btn primary-edit" id="editContentBtn">生成后编辑内容</button>
            <button class="ghost-btn" id="continueDraftBtn">继续编辑草稿</button>
          </div>
          <div class="copy-output" id="copyOutput">文案结果会显示在这里。</div>
          <div class="image-section" id="imageSection">
            <div class="image-section-title">相关图片 <span>最多 30 张</span></div>
            <div class="image-empty">暂无图片</div>
          </div>
          <div class="small-actions">
            <button class="ghost-btn" id="copyBtn">复制文案</button>
            <button class="ghost-btn" id="downloadBtn">下载 TXT</button>
            <button class="ghost-btn" id="clearBtn">清空</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast">已完成</div>

  <script>
    let topics = [];
    let selectedTopic = null;
    let lastCopyFilename = 'hotstream-copy.txt';
    let lastGeneratedImages = [];
    let lastGeneratedDraft = null;
    let lastVideoAnalysis = null;
    let lastVideoImages = [];
    let lastAnalyzedVideoUrl = '';
    const topicList = document.getElementById('topicList');
    const output = document.getElementById('copyOutput');
    const imageSection = document.getElementById('imageSection');
    const toast = document.getElementById('toast');
    const fetchBtn = document.getElementById('fetchBtn');
    const fetchMeta = document.getElementById('fetchMeta');
    const keywordInput = document.getElementById('keyword');
    const sourceSelect = document.getElementById('source');
    const bilibiliTools = document.getElementById('bilibiliTools');
    const bilibiliCategory = document.getElementById('bilibiliCategory');
    const briefInput = document.getElementById('brief');
    const deepseekApiKeyInput = document.getElementById('deepseekApiKey');
    const qwenApiKeyInput = document.getElementById('qwenApiKey');
    const analyzeVideoBtn = document.getElementById('analyzeVideoBtn');
    const videoAnalysisPanel = document.getElementById('videoAnalysisPanel');
    const videoAnalysisOutput = document.getElementById('videoAnalysisOutput');
    const toggleApiKeyBtn = document.getElementById('toggleApiKeyBtn');
    const globalPromptInput = document.getElementById('globalPrompt');
    const temporaryPromptInput = document.getElementById('temporaryPrompt');
    const EDIT_IMPORT_KEY = 'hotstream.editorDraft';
    const EDIT_LIVE_KEY = 'hotstream.editorLiveDraft';

    function currentSourceLabel() {
      return sourceSelect.options[sourceSelect.selectedIndex].textContent;
    }

    function isBilibiliMode() {
      return sourceSelect.value === 'bilibili';
    }

    function resetVideoAnalysis(text = '选择 B站视频后，先用 Qwen2.5-VL 分析封面/公开信息，再交给 DeepSeek 生成前山牧场四季牧歌推文。') {
      lastVideoAnalysis = null;
      lastVideoImages = [];
      lastAnalyzedVideoUrl = '';
      videoAnalysisOutput.textContent = text;
    }

    function updateSourceModeUI() {
      const isBili = isBilibiliMode();
      bilibiliTools.classList.toggle('hidden', !isBili);
      videoAnalysisPanel.classList.toggle('hidden', !isBili);
      if (!isBili) resetVideoAnalysis('切换到 B站视频后，可先分析视频内容。');
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1600);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[char]));
    }

    function formatTime(value) {
      if (!value) return '';
      return new Date(value).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function downloadTextFile(text, filename) {
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename || 'hotstream-copy.txt';
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function getGeneratedText() {
      const text = output.textContent.trim();
      if (!text || text === '文案结果会显示在这里。') return '';
      return text;
    }

    function renderImages(images = []) {
      const safeImages = Array.isArray(images) ? images.filter(image => image && image.url) : [];
      if (!safeImages.length) {
        imageSection.innerHTML = `
          <div class="image-section-title">相关图片 <span>最多 30 张</span></div>
          <div class="image-empty">暂未抓到稳定可用的相关图片，可换一个热点或稍后再试。</div>
        `;
        return;
      }
      imageSection.innerHTML = `
        <div class="image-section-title">相关图片 <span>${safeImages.length} 张，点击可打开原图</span></div>
        <div class="image-grid">
          ${safeImages.map(image => `
            <a class="image-card" href="${escapeHtml(image.url)}" target="_blank" rel="noopener noreferrer">
              <img src="${escapeHtml(image.thumbnail || image.url)}" alt="${escapeHtml(image.title || '相关图片')}" loading="lazy" referrerpolicy="no-referrer" />
              <span>${escapeHtml(image.title || '相关图片')}${image.source ? ` · ${escapeHtml(image.source)}` : ''}</span>
            </a>
          `).join('')}
        </div>
      `;
    }

    function resetImagesPlaceholder(text = '暂无图片') {
      imageSection.innerHTML = `
        <div class="image-section-title">相关图片 <span>最多 30 张</span></div>
        <div class="image-empty">${escapeHtml(text)}</div>
      `;
    }

    async function loadPromptsForCurrentTopic({ silent = false } = {}) {
      const topic = selectedTopic || {};
      const brief = briefInput.value.trim();
      try {
        const response = await fetch('/api/prompts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic, brief, qwen_analysis: lastVideoAnalysis })
        });
        const payload = await response.json();
        if (!payload.success) throw new Error(payload.error || '提示词加载失败');
        globalPromptInput.value = payload.global_prompt || '';
        temporaryPromptInput.value = payload.temporary_prompt || '';
        if (!silent) showToast('已恢复默认提示词');
      } catch (error) {
        if (!silent) showToast(error.message || '提示词加载失败');
      }
    }

    function filteredTopics() {
      const keyword = keywordInput.value.trim().toLowerCase();
      if (!keyword || isBilibiliMode()) return topics;
      return topics.filter(topic => topic.title.toLowerCase().includes(keyword));
    }

    function renderTopics() {
      const visibleTopics = filteredTopics();
      const sourceLabel = currentSourceLabel();
      if (!visibleTopics.length) {
        topicList.innerHTML = `<div class="empty">没有匹配的${escapeHtml(sourceLabel)}热点。</div>`;
        return;
      }

      topicList.innerHTML = visibleTopics.map(topic => `
        <div class="topic" role="button" tabindex="0" data-rank="${topic.rank}">
          <span class="rank">${topic.rank}</span>
          <span class="topic-text"><strong>${escapeHtml(topic.title)}</strong><span class="topic-source">${escapeHtml(topic.source || '今日头条')}</span></span>
          <span class="hot">热度 ${Number(topic.hot_value || 0).toLocaleString('zh-CN')}</span>
          ${topic.url ? `
            <a class="topic-link" href="${escapeHtml(topic.url)}" target="_blank" rel="noopener noreferrer" aria-label="打开原文链接：${escapeHtml(topic.title)}" title="打开原文链接">↗</a>
          ` : '<span class="topic-link disabled" aria-label="暂无原文链接" title="暂无原文链接">—</span>'}
        </div>
      `).join('');

      function selectTopicItem(item) {
        document.querySelectorAll('.topic').forEach(el => el.classList.remove('selected'));
        item.classList.add('selected');
        selectedTopic = topics.find(topic => String(topic.rank) === item.dataset.rank);
        resetVideoAnalysis(isBilibiliMode() ? '已选择 B站视频。请填写 Qwen API Key 后点击“分析所选 B站视频”。' : '切换到 B站视频后，可先分析视频内容。');
        briefInput.value = isBilibiliMode()
          ? `请基于这个 B站视频热点和 Qwen 视频分析结果，写一篇宣传前山牧场四季牧歌民俗风情园的推文成稿，适合小红书/公众号，语气自然，不要硬广，不要编造视频拍摄地。`
          : `请基于「${selectedTopic.title}」直接写一篇宣传前山牧场四季牧歌民俗风情园的推文成稿，适合小红书/公众号开头，语气简洁、有信息量。不要输出写作建议或可选角度。`;
        loadPromptsForCurrentTopic({ silent: true });
        showToast('已选择热点');
      }

      document.querySelectorAll('.topic-link').forEach(link => {
        link.addEventListener('click', event => event.stopPropagation());
      });

      document.querySelectorAll('.topic').forEach(item => {
        item.addEventListener('click', () => selectTopicItem(item));
        item.addEventListener('keydown', event => {
          if (event.key !== 'Enter' && event.key !== ' ') return;
          event.preventDefault();
          selectTopicItem(item);
        });
      });
    }

    async function fetchHotTopics({ silent = false } = {}) {
      const source = sourceSelect.value;
      const sourceLabel = currentSourceLabel();
      fetchBtn.disabled = true;
      fetchBtn.textContent = '正在抓取...';
      if (!silent) topicList.innerHTML = `<div class="empty">正在抓取${escapeHtml(sourceLabel)}热点...</div>`;

      try {
        const params = new URLSearchParams({ source, limit: '20' });
        if (isBilibiliMode()) {
          params.set('sort', 'traffic_desc');
          params.set('category', bilibiliCategory.value);
          if (keywordInput.value.trim()) params.set('keyword', keywordInput.value.trim());
        }
        const response = await fetch(`/api/hot-topics?${params.toString()}`, { cache: 'no-store' });
        const payload = await response.json();
        if (!payload.success) throw new Error(payload.error || '抓取失败');
        topics = payload.topics || [];
        selectedTopic = null;
        renderTopics();
        const payloadSource = payload.source || sourceLabel;
        fetchMeta.textContent = `已显示 ${topics.length} 条${payloadSource}实时热点 · 更新时间 ${formatTime(payload.updated_at)}`;
        if (!silent) showToast(`已抓取 ${topics.length} 条${payloadSource}热点`);
      } catch (error) {
        topicList.innerHTML = `<div class="empty">${escapeHtml(sourceLabel)}热点抓取失败：${escapeHtml(error.message)}。请确认已通过 python main.py 启动服务。</div>`;
        fetchMeta.textContent = '抓取失败，可稍后手动刷新。';
        showToast('热点抓取失败');
      } finally {
        fetchBtn.disabled = false;
        fetchBtn.textContent = `刷新${sourceLabel}热点`;
      }
    }

    fetchBtn.addEventListener('click', () => fetchHotTopics());
    sourceSelect.addEventListener('change', () => {
      updateSourceModeUI();
      fetchHotTopics();
    });
    bilibiliCategory.addEventListener('change', () => {
      if (isBilibiliMode()) fetchHotTopics();
    });
    keywordInput.addEventListener('input', () => {
      if (isBilibiliMode()) return;
      renderTopics();
    });
    keywordInput.addEventListener('keydown', event => {
      if (event.key === 'Enter' && isBilibiliMode()) fetchHotTopics();
    });
    deepseekApiKeyInput.value = localStorage.getItem('hotstream.deepseekApiKey') || '';
    qwenApiKeyInput.value = localStorage.getItem('hotstream.qwenApiKey') || '';
    qwenApiKeyInput.addEventListener('input', () => {
      localStorage.setItem('hotstream.qwenApiKey', qwenApiKeyInput.value);
    });
    deepseekApiKeyInput.addEventListener('input', () => {
      localStorage.setItem('hotstream.deepseekApiKey', deepseekApiKeyInput.value);
    });
    toggleApiKeyBtn.addEventListener('click', () => {
      const isHidden = deepseekApiKeyInput.type === 'password';
      deepseekApiKeyInput.type = isHidden ? 'text' : 'password';
      toggleApiKeyBtn.textContent = isHidden ? '隐藏' : '显示';
      toggleApiKeyBtn.setAttribute('aria-pressed', String(isHidden));
    });
    document.getElementById('resetPromptsBtn').addEventListener('click', () => loadPromptsForCurrentTopic());

    function renderVideoAnalysis(analysis) {
      if (!analysis) {
        videoAnalysisOutput.textContent = '暂无视频分析结果。';
        return;
      }
      const lines = [];
      if (analysis.summary) lines.push(`概述：${analysis.summary}`);
      if (Array.isArray(analysis.visual_keywords) && analysis.visual_keywords.length) lines.push(`视觉关键词：${analysis.visual_keywords.join('、')}`);
      if (Array.isArray(analysis.scenes) && analysis.scenes.length) lines.push(`场景：${analysis.scenes.join('、')}`);
      if (Array.isArray(analysis.audience_emotion) && analysis.audience_emotion.length) lines.push(`受众情绪：${analysis.audience_emotion.join('、')}`);
      if (Array.isArray(analysis.usable_facts) && analysis.usable_facts.length) lines.push(`可用事实：${analysis.usable_facts.join('、')}`);
      if (Array.isArray(analysis.risks) && analysis.risks.length) lines.push(`风险提醒：${analysis.risks.join('、')}`);
      videoAnalysisOutput.textContent = lines.join('\n') || JSON.stringify(analysis, null, 2);
    }

    analyzeVideoBtn.addEventListener('click', async () => {
      if (!selectedTopic || selectedTopic.source !== 'B站') {
        showToast('请先选择一个 B站视频');
        return;
      }
      const qwenApiKey = qwenApiKeyInput.value.trim();
      if (!qwenApiKey) {
        showToast('请先填写 Qwen API Key');
        qwenApiKeyInput.focus();
        return;
      }
      analyzeVideoBtn.disabled = true;
      analyzeVideoBtn.textContent = 'Qwen 正在分析视频...';
      videoAnalysisOutput.textContent = 'Qwen2.5-VL 正在分析视频封面、标题、简介和公开流量数据...';
      try {
        const response = await fetch('/api/analyze-video', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic: selectedTopic, api_key: qwenApiKey })
        });
        const payload = await response.json();
        if (!payload.success) throw new Error(payload.error || '视频分析失败');
        lastVideoAnalysis = payload.analysis || {};
        lastVideoImages = payload.images || [];
        lastAnalyzedVideoUrl = selectedTopic.url || selectedTopic.bvid || selectedTopic.title;
        renderVideoAnalysis(lastVideoAnalysis);
        if (lastVideoImages.length) renderImages(lastVideoImages);
        await loadPromptsForCurrentTopic({ silent: true });
        showToast('视频分析完成');
      } catch (error) {
        resetVideoAnalysis(`视频分析失败：${error.message}`);
        showToast('视频分析失败');
      } finally {
        analyzeVideoBtn.disabled = false;
        analyzeVideoBtn.textContent = '用 Qwen2.5-VL 分析所选 B站视频';
      }
    });

    updateSourceModeUI();
    loadPromptsForCurrentTopic({ silent: true });
    fetchHotTopics({ silent: true });
    setInterval(() => fetchHotTopics({ silent: true }), 60000);

    document.getElementById('generateBtn').addEventListener('click', async () => {
      if (!selectedTopic) {
        showToast('请先选择一个热点');
        return;
      }
      const brief = briefInput.value.trim();
      const apiKey = deepseekApiKeyInput.value.trim();
      if (!apiKey) {
        showToast('请先在高级设置里填写 DeepSeek API Key');
        deepseekApiKeyInput.focus();
        return;
      }
      const globalPrompt = globalPromptInput.value.trim();
      const temporaryPrompt = temporaryPromptInput.value.trim();
      if (selectedTopic.source === 'B站' && (!lastVideoAnalysis || lastAnalyzedVideoUrl !== (selectedTopic.url || selectedTopic.bvid || selectedTopic.title))) {
        showToast('请先用 Qwen 分析所选 B站视频');
        return;
      }
      const generateBtn = document.getElementById('generateBtn');
      generateBtn.disabled = true;
      generateBtn.textContent = 'DeepSeek 正在生成...';
      output.textContent = 'DeepSeek 正在撰写文案，请稍候...';
      resetImagesPlaceholder('正在同步抓取相关图片...');

      try {
        const response = await fetch('/api/generate-copy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            topic: selectedTopic,
            brief,
            api_key: apiKey,
            global_prompt: globalPrompt,
            temporary_prompt: temporaryPrompt,
            qwen_analysis: lastVideoAnalysis,
            source_images: lastVideoImages
          })
        });
        const payload = await response.json();
        if (!payload.success) throw new Error(payload.error || '生成失败');
        output.textContent = payload.copy;
        lastGeneratedImages = payload.images || [];
        lastGeneratedDraft = payload.draft || null;
        renderImages(lastGeneratedImages);
        lastCopyFilename = payload.filename || 'hotstream-copy.txt';
        showToast('文案和图片已生成');
      } catch (error) {
        output.textContent = `文案生成失败：${error.message}`;
        resetImagesPlaceholder('文案生成失败，未展示图片。');
        showToast('文案生成失败');
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = '生成文案';
      }
    });

    document.getElementById('editContentBtn').addEventListener('click', () => {
      const text = getGeneratedText();
      if (!text) return showToast('请先生成文案再进入编辑页');
      const draft = lastGeneratedDraft || {
        title: selectedTopic?.title || 'HotStream 文案',
        topic: selectedTopic,
        content: text,
        images: lastGeneratedImages,
        analysis: lastVideoAnalysis,
        filename: lastCopyFilename,
        updated_at: new Date().toISOString()
      };
      localStorage.setItem(EDIT_IMPORT_KEY, JSON.stringify(draft));
      window.location.href = '/editor.html';
    });

    document.getElementById('continueDraftBtn').addEventListener('click', () => {
      if (!localStorage.getItem(EDIT_LIVE_KEY)) {
        showToast('暂无本地草稿；生成文案后可进入编辑页保存');
        return;
      }
      window.location.href = '/editor.html';
    });

    document.getElementById('copyBtn').addEventListener('click', async () => {
      const text = getGeneratedText();
      if (!text) return showToast('暂无可复制文案');
      try {
        await navigator.clipboard.writeText(text);
        showToast('已复制文案');
      } catch {
        showToast('当前浏览器不支持自动复制');
      }
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const text = getGeneratedText();
      if (!text) return showToast('暂无可下载文案');
      downloadTextFile(text, lastCopyFilename);
      showToast('TXT 已下载');
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      selectedTopic = null;
      lastCopyFilename = 'hotstream-copy.txt';
      lastGeneratedImages = [];
      lastGeneratedDraft = null;
      briefInput.value = '';
      temporaryPromptInput.value = '';
      loadPromptsForCurrentTopic({ silent: true });
      output.textContent = '文案结果会显示在这里。';
      resetImagesPlaceholder();
      resetVideoAnalysis();
      document.querySelectorAll('.topic').forEach(el => el.classList.remove('selected'));
      showToast('已清空');
    });
  </script>
</body>
</html>
